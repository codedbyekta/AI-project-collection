<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI Flashcard Generator – Instantly generate smart flashcards on any topic, right in your browser. No backend, no API." />
  <title>AI Flashcard Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Background Orbs ── -->
  <div class="bg-orb orb-1" aria-hidden="true"></div>
  <div class="bg-orb orb-2" aria-hidden="true"></div>
  <div class="bg-orb orb-3" aria-hidden="true"></div>

  <!-- ── Header ── -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon" aria-hidden="true">⚡</span>
        <span class="logo-text">FlashAI</span>
      </div>
      <button id="theme-toggle" class="theme-btn" aria-label="Toggle dark/light mode" title="Toggle theme">
        <span class="theme-icon" id="theme-icon">☀️</span>
      </button>
    </div>
  </header>

  <!-- ── Main ── -->
  <main>
    <section class="hero" aria-labelledby="hero-heading">
      <h1 id="hero-heading" class="hero-title">
        Generate Flashcards
        <span class="gradient-text">Instantly</span>
      </h1>
      <p class="hero-subtitle">
        Type any topic and let our mock-AI create smart study cards for you — all in your browser, zero servers.
      </p>
    </section>

    <!-- ── Control Panel ── -->
    <section class="control-panel glass-card" aria-label="Flashcard generator controls">
      <div class="input-group">
        <label for="topic-input" class="sr-only">Enter a topic</label>
        <div class="input-wrapper">
          <span class="input-icon" aria-hidden="true">🔍</span>
          <input
            id="topic-input"
            type="text"
            placeholder="e.g. Photosynthesis, Machine Learning, The French Revolution…"
            autocomplete="off"
            spellcheck="false"
            maxlength="100"
          />
          <span class="char-count" id="char-count">0/100</span>
        </div>
        <div id="input-error" class="input-error" role="alert" aria-live="polite"></div>
      </div>

      <div class="controls-row">
        <div class="select-group">
          <label for="difficulty-select" class="select-label">Difficulty</label>
          <div class="select-wrapper">
            <select id="difficulty-select" aria-label="Select difficulty level">
              <option value="easy">🟢 Easy</option>
              <option value="medium" selected>🟡 Medium</option>
              <option value="hard">🔴 Hard</option>
            </select>
          </div>
        </div>

        <div class="select-group">
          <label for="count-select" class="select-label">Card Count</label>
          <div class="select-wrapper">
            <select id="count-select" aria-label="Select number of flashcards">
              <option value="5">5 cards</option>
              <option value="7" selected>7 cards</option>
              <option value="10">10 cards</option>
            </select>
          </div>
        </div>

        <button id="generate-btn" class="btn btn-primary" aria-label="Generate flashcards">
          <span class="btn-icon" aria-hidden="true">✨</span>
          <span class="btn-text">Generate Flashcards</span>
        </button>
      </div>
    </section>

    <!-- ── Status / Loading ── -->
    <div id="status-area" class="status-area" aria-live="polite" aria-atomic="true"></div>

    <!-- ── Results Area ── -->
    <section id="results-section" class="results-section" aria-label="Generated flashcards" hidden>
      <div class="results-header">
        <div class="results-meta">
          <span id="results-title" class="results-title"></span>
          <span id="results-badge" class="badge"></span>
        </div>
        <div class="results-actions">
          <button id="shuffle-btn" class="btn btn-ghost" aria-label="Shuffle flashcards">
            <span aria-hidden="true">🔀</span> Shuffle
          </button>
          <button id="regenerate-btn" class="btn btn-ghost" aria-label="Regenerate flashcards">
            <span aria-hidden="true">🔄</span> Regenerate
          </button>
          <button id="reveal-all-btn" class="btn btn-ghost" aria-label="Reveal all answers">
            <span aria-hidden="true">👁️</span> Reveal All
          </button>
        </div>
      </div>

      <!-- Progress bar -->
      <div class="progress-bar-wrap" aria-label="Flashcard reveal progress">
        <div class="progress-bar-track">
          <div id="progress-bar" class="progress-bar-fill"></div>
        </div>
        <span id="progress-label" class="progress-label">0 revealed</span>
      </div>

      <!-- Cards grid -->
      <div id="cards-grid" class="cards-grid" role="list"></div>
    </section>
  </main>

  <!-- ── Footer ── -->
  <footer class="site-footer">
    <p>Built with <span aria-label="love">❤️</span> · Pure HTML, CSS &amp; Vanilla JS · No API used</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
